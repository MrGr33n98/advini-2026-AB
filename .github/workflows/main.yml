name: LegalTech CI/CD Pipeline

on:
  push:
    branches: [ main, master ]

jobs:
  backend-test:
    name: Backend Tests (Rails)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: avalia_juridico_test
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler-cache: true
          working-directory: admin_example
      - name: Build and run tests
        env:
          RAILS_ENV: test
          DB_HOST: localhost
          DB_PASSWORD: password
        run: |
          cd admin_example
          bundle exec rake db:prepare
          # Ignorando rspec por enquanto até termos testes reais
          # bundle exec rspec

  deploy:
    name: Deploy do Production
    needs: [backend-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/advini-2026-AB || git clone https://github.com/${{ github.repository }}.git ~/advini-2026-AB
            cd ~/advini-2026-AB
            git pull origin main
            export RAILS_MASTER_KEY=${{ secrets.RAILS_MASTER_KEY }}
            docker-compose up -d --build
