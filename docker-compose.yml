services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: avalia_juridico_production
    ports:
      - "5432:5432"

  backend:
    build: 
      context: ./admin_example
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/avalia_juridico_production
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      RAILS_SERVE_STATIC_FILES: "true"
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://3.236.95.204:3000/api/v1
    ports:
      - "80:3000"

volumes:
  postgres_data:
