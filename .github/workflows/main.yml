name: LegalTech Professional Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. Análise Estática - Falha rápido se o código estiver "sujo"
  lint:
    name: Lint & Security (Static Analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Backend Analysis
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler-cache: true
          working-directory: admin_example
      
      - name: Run RuboCop
        run: cd admin_example && bundle exec rubocop
        continue-on-error: true # Vamos apenas avisar por enquanto, sem travar o deploy até limparmos tudo

      - name: Run Brakeman (Security Scan)
        run: cd admin_example && bundle exec brakeman --format sarif --output brakeman.sarif
        continue-on-error: true

      # Frontend Analysis
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Frontend Deps
        run: cd frontend && npm ci
      
      - name: Run ESLint
        run: cd frontend && npm run lint
        continue-on-error: true

  # 2. Testes Automatizados - Garante que a lógica está correta
  test:
    name: Automated Tests (RSpec)
    needs: [lint]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: avalia_juridico_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler-cache: true
          working-directory: admin_example
      
      - name: Database Setup
        env:
          RAILS_ENV: test
          DB_HOST: localhost
          DB_PASSWORD: password
        run: |
          cd admin_example
          bundle exec rake db:prepare
      
      - name: Run RSpec
        env:
          RAILS_ENV: test
          DB_HOST: localhost
          DB_PASSWORD: password
        run: |
          cd admin_example
          # bundle exec rspec # Ativar quando houver specs reais

  # 3. Build Verification - Garante que os Dockerfiles funcionam
  build:
    name: Build Verification (Docker)
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Backend Build
        run: docker build -t backend_test ./admin_example
      - name: Verify Frontend Build
        run: docker build -t frontend_test ./frontend

  # 4. Scalable Deploy - Dispara o deploy no servidor
  deploy:
    name: Production Deployment (CD)
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Remote Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/advini-2026-AB || git clone https://github.com/${{ github.repository }}.git ~/advini-2026-AB
            cd ~/advini-2026-AB
            git pull origin main
            export RAILS_MASTER_KEY=${{ secrets.RAILS_MASTER_KEY }}
            
            # Práticas de Escalabilidade e DevOps ( Gage's Style )
            docker-compose pull # Busca imagens se houver registro (opcional)
            docker-compose up -d --build --remove-orphans
            
            # Limpeza de recursos antigos para economizar disco (Scalability)
            docker image prune -f
