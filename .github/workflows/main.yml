name: LegalTech Professional Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. Análise Estática & Segurança
  quality-gate:
    name: Lint & Security Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Setup Environments
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler-cache: true
          working-directory: admin_example
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Frontend Deps
        run: cd frontend && npm ci

      # Execute Scripts
      - name: Run Backend Lint
        run: bash scripts/backend-lint.sh
        continue-on-error: true

      - name: Run Security Scans
        run: bash scripts/security-scan.sh
        continue-on-error: true

      - name: Run Frontend Checks
        run: bash scripts/frontend-check.sh
        continue-on-error: true

  # 2. Testes Automatizados
  test:
    name: Automated Tests
    needs: [quality-gate]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: avalia_juridico_test
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler-cache: true
          working-directory: admin_example
          
      - name: Run Backend Tests Script
        env:
          RAILS_ENV: test
          DB_HOST: localhost
          DB_PASSWORD: password
        run: bash scripts/backend-test.sh

  # 3. Build & Deploy
  deploy:
    name: Production Deployment
    needs: [test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Remote Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/advini-2026-AB || git clone https://github.com/${{ github.repository }}.git ~/advini-2026-AB
            cd ~/advini-2026-AB
            git pull origin main
            export RAILS_MASTER_KEY=${{ secrets.RAILS_MASTER_KEY }}
            docker-compose up -d --build --remove-orphans
            docker image prune -f
