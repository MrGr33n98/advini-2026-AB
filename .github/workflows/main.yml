name: LegalTech CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    name: Backend Tests (Rails)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: avalia_juridico_test
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler-cache: true
          working-directory: admin_example
      - name: Build and run tests
        env:
          RAILS_ENV: test
          DB_HOST: localhost
          DB_PASSWORD: password
        run: |
          cd admin_example
          bundle exec rake db:create db:migrate
          bundle exec rspec

  frontend-build:
    name: Frontend Build (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd frontend
          npm install
      - name: Next.js Build
        run: |
          cd frontend
          npm run build

  deploy:
    name: Deploy to AWS
    needs: [backend-test, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy announcement
        run: echo "Deploying to production server..."
      # Add Docker Build and Push steps here
      # Add AWS EC2 deployment steps here
