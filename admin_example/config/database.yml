default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: postgres
  password: 
  host: localhost

development:
  <<: *default
  database: avalia_juridico_development

test:
  <<: *default
  database: avalia_juridico_test

production:
  <<: *default
  database: avalia_juridico_production
  password: <%= ENV["AVALIA_JURIDICO_DATABASE_PASSWORD"] %>
